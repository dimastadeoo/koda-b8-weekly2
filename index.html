<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marketplace">
    <title>Marketplace</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body {
            background-color: #F8F9FA;
        }

        header {
            background-color: #FFFFFF;
            border-bottom:solid ;
            border-color: #0000001A;
            border-bottom-width: 1px;
        }
        .headOne{
            width: 1728px;
            height: 28px;
            background-color: #1A73E8;
            padding: 6px 224px;
        }
        .div-one{
            max-width: 1280px;
            width: 1280px;
            height: 16px;
            padding: 0 16px;
            justify-content: space-between;
            position: relative;
            
        }
        span.left{
            width: 156px;
            height: 16px;
            display: inline-block;
            position: absolute;
            padding: 0;
            gap: 4px;
            align-items: center;
            padding-bottom: 2px;
        }
        span.right{
            width: 360.010009765625px;
            height: 16px;
            gap: 16.01px;
            padding: 0;
            right: 0;
            display: inline-block;
            position: absolute;
        }
        .img-map{
            width: 11px;
            height: 11px;
            display: inline-block;
        }
        span.text-city{
            width: 141px;
            height: 20px; 
            margin:0;
            display: inline-block;
        }
        span.phone{
            width: 160px;
            height: 16px;
            padding: 0 8px;
        }
        span.ongkir{
            width: 197px;
            height: 16px;
            padding-left: 8px;
            
        }
        span.top-text {
            color: #FFFFFF;
            font-weight: 400;
            font-size: 12px;
            line-height: 16px;
            letter-spacing: 0;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <header>
        <div class="headOne">
            <div class="div-one">
                <span class="left">
                    <img class="img-map" src="/asset/img/map-icon.png" alt="Icon Map">
                    <span class="top-text text-city">Kirim ke: Jakarta Selatan</span>
                </span>
                <span class="right top-text">
                    <span class="phone">📞 0800-1234-5678 (Gratis)</span>
                    <span class="ongkir">🚀 Gratis ongkir di atas Rp 100.000</span>
                </span>
            </div>
        </div>
        <div class="headTwo">

        </div>
        <div>
            
        </div>
    </header>
    
</body>
</html>
