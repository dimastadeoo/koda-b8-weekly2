<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marketplace">
    <title>Marketplace</title>
    <link rel="stylesheet" href="/asset/css/style.css">
</head>
<body>
    <header>
        <div class="headOne">
            <div class="div-one">
                <span class="left">
                    <img class="img-map" src="/asset/img/map-icon.png" alt="Icon Map">
                    <span class="top-text text-city">Kirim ke: Jakarta Selatan</span>
                </span>
                <span class="right top-text">
                    <span class="phone">📞 0800-1234-5678 (Gratis)</span>
                    <span class="ongkir">🚀 Gratis ongkir di atas Rp 100.000</span>
                </span>
            </div>
        </div>
        <div class="headTwo">
            <div class="div-two">
                <span class="beliMudah">
                    <span class="logoB">
                        <a href="#">B</a>
                    </span>
                    <span class="textLogo">
                        <a href="#">BeliMudah</a>
                    </span>
                </span>
                <span class="search">
                    <form class="form">
                        <input class="input-form" placeholder="Cari produk, merek, kategori...">
                        <button class="search-form">
                            <img class="search-icon" src="/asset/img/search-icon.png" alt="search-icon">
                        </button>
                    </form>
                </span>
                <span class="icon">
                    <span class="bell">
                        <img src="/asset/img/bell.png" alt="lonceng">
                    </span>
                    <span class="profile">
                        <img src="/asset/img/profile.png" alt="Icon Profile">
                        <span class="profile-name">
                            <a href="#">Budi</a>
                        </span>
                    </span>
                    <span class="love">
                        <img src="/asset/img/love.png" alt="Icon Favorite">
                    </span>
                    <span class="cart">
                        <img src="/asset/img/cart.png" alt="Icon Keranjang">
                    </span>
                </span>
            </div>
        </div>
        <nav>
            <span class="category-container">
                <img src="/asset/img/list.png" alt="icon list">
                <span class="textNav">Semua Kategori</span>
                <img src="/asset/img/bottom-arrow.png" alt="bottom arrow">
            </span>
            <span class="category-container">
                <span class="textNav">💻 Elektronik</span> 
            </span>
            <span class="category-container">
                <span class="textNav">👗 Fashion</span> 
            </span>
            <span class="category-container">
                <span class="textNav">🏠 Rumah & Dapur</span> 
            </span>
            <span class="category-container">
                <span class="textNav">💄 Kecantikan</span> 
            </span>
            <span class="category-container">
                <span class="textNav">⚽ Olahraga</span> 
            </span>
            <span class="category-container">
                <span class="textNav">📚 Buku & Alat Tulis</span> 
            </span>
            <span class="category-container">
                <span class="textNav">🔥 Promo</span> 
            </span>
        </nav>
    </header>
    
    
</body>
</html>
