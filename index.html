<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Marketplace">
    <title>Marketplace</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }
        body {
            background-color: #F8F9FA;
        }

        header {
            width: 1728px;
            height: 134px;
            background-color: #FFFFFF;
            border-bottom:solid ;
            border-color: #0000001A;
            border-bottom-width: 1px;
            position: sticky;
            top: 0;
        }
        .headOne{
            width: 1728px;
            max-width: 1728px;
            height: 28px;
            background-color: #1A73E8;
            padding: 6px 224px;
        }
        .div-one{
            max-width: 1280px;
            width: 1280px;
            height: 16px;
            padding: 0 16px;
            justify-content: space-between;
            position: relative;
            
        }
        span.left{
            width: 156px;
            height: 16px;
            display: inline-block;
            position: absolute;
            padding: 0;
            gap: 4px;
            align-items: center;
            padding-bottom: 2px;
        }
        span.right{
            width: 360.010009765625px;
            height: 16px;
            gap: 16.01px;
            padding: 0;
            right: 0;
            display: inline-block;
            position: absolute;
        }
        .img-map{
            width: 11px;
            height: 11px;
            display: inline-block;
        }
        span.text-city{
            width: 141px;
            height: 20px; 
            margin:0;
            display: inline-block;
        }
        span.phone{
            width: 160px;
            height: 16px;
            padding: 0 8px;
        }
        span.ongkir{
            width: 197px;
            height: 16px;
            padding-left: 8px;
            
        }
        span.top-text {
            color: #FFFFFF;
            font-weight: 400;
            font-size: 12px;
            line-height: 16px;
            letter-spacing: 0;
            vertical-align: middle;
        }
        
        .headTwo{
            width: 1728px;
            height: 64px;
            max-width: 1728px;
            padding: 0 224px;
            position: relative;
        }
        .div-two{
            max-width: 1280px;
            width: 1280px;
            height: 64px;
            padding: 12px;
            gap: 16px;
            position: relative;
        }
        span.beliMudah{
            width: 120px;
            height: 32px;
            display: inline-block;
            gap: 8px;
        }
        span.logoB{
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background-color: #1A73E8;
            position: absolute;
            top: 16px;
            color: #FFFFFF;
            display: inline-block;
        }
        span.logoB > a{
            width: 10px;
            height: 20px;
            padding: 0 11px;
            font-weight: 400;
            text-decoration: none;
            font-size: 14px;
            line-height: 32px;
            text-align: center;
            color: #FFFFFF;
        }
        span.textLogo{
            width: 80px;
            height: 24px;
            display: inline-block;
            color: #111827;
            position: absolute;
            line-height: 24px;
            letter-spacing: 0%;
            top: 19px;
            left: 59px;
        }
        span.textLogo > a{
            vertical-align: middle;
            line-height: 24px;
            letter-spacing: 0%;
            font-weight: 400;
            font-size: 16px;
            color: #111827;
            text-decoration: none;
        }
        span.search{
            width: 576px;
            height: 42px;
            display: inline-block;
            position: absolute;
            padding: 0 11.5px;
         
            
        }
        .search > .form{
            width: 576px;
            height: 42px;
            border-radius: 12px;
            border: 1px solid #0000001A;
            background-color: #F3F4F6;
            position: relative;
        }
        .input-form {
            width: 100%; 
            height: 100%;  
            border: none;
            outline: none;
            background-color: transparent;
            border-radius: 12px;
            padding-left: 16px;
            padding-right: 56px;
            font-size: 14px;
            color: #111827;
        }

        .input-form::placeholder {
            color: #9CA3AF;
            font-weight: 400;
        }
        .search-form {
            width: 44px;   
            height: 36px;
            background-color: #1A73E8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            position: absolute;
            top: 2px;   
            right: 3px;         
            text-align: center;
        }

        .search-icon {
            width: 16px;
            height: 16px;
            vertical-align: middle;
        }
        span.icon{
            width: 210px;
            height: 40px;
            max-width: 1280px;
            gap: 4px;
            right: 332px;
            display: inline-block;
            position: absolute;
        }
        .icon > span{
            display: inline-block;
            border-radius: 8px;
            padding: 10px;
        }
        span.bell, span.love, span.cart{
            width: 40px;
            height: 40px;
        }
        .bell > img, .profile > img, .love > img, .cart > img {
            display: inline-block;
            width: 20px;
            height: 20px;
        }
        span.profile{
            width: 78px;
            height: 40px;
            gap: 8px;
        }
        span.profile-name{
            position: absolute;
            display: inline-block;
            height: 20px;
            width: 30px;
            padding: 0 8px;

        }
        .profile-name > a{
            text-decoration: none;
            font-size: 14px;
            line-height: 20px;
            letter-spacing: 0%;
            vertical-align: middle;
            color: #111827;
        }

        


    </style>
</head>
<body>
    <header>
        <div class="headOne">
            <div class="div-one">
                <span class="left">
                    <img class="img-map" src="/asset/img/map-icon.png" alt="Icon Map">
                    <span class="top-text text-city">Kirim ke: Jakarta Selatan</span>
                </span>
                <span class="right top-text">
                    <span class="phone">📞 0800-1234-5678 (Gratis)</span>
                    <span class="ongkir">🚀 Gratis ongkir di atas Rp 100.000</span>
                </span>
            </div>
        </div>
        <div class="headTwo">
            <div class="div-two">
                <span class="beliMudah">
                    <span class="logoB">
                        <a href="#">B</a>
                    </span>
                    <span class="textLogo">
                        <a href="#">BeliMudah</a>
                    </span>
                </span>
                <span class="search">
                    <form class="form">
                        <input class="input-form" placeholder="Cari produk, merek, kategori...">
                        <button class="search-form">
                            <img class="search-icon" src="/asset/img/search-icon.png" alt="search-icon">
                        </button>
                    </form>
                </span>
                <span class="icon">
                    <span class="bell">
                        <img src="/asset/img/bell.png" alt="lonceng">
                    </span>
                    <span class="profile">
                        <img src="/asset/img/profile.png" alt="Icon Profile">
                        <span class="profile-name">
                            <a href="#">Budi</a>
                        </span>
                    </span>
                    <span class="love">
                        <img src="/asset/img/love.png" alt="Icon Favorite">
                    </span>
                    <span class="cart">
                        <img src="/asset/img/cart.png" alt="Icon Keranjang">
                    </span>
                </span>
            </div>
        </div>
        <div>
            
        </div>
    </header>
    
</body>
</html>
